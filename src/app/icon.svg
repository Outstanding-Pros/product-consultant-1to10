<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <circle cx="16" cy="16" r="16" fill="#0a0a0c"/>
  <!-- 3 blades (each blade: ellipse rotated 120° around center) -->
  <ellipse cx="16" cy="8" rx="4" ry="7.5" fill="#4ade80" transform="rotate(0 16 16)"/>
  <ellipse cx="16" cy="8" rx="4" ry="7.5" fill="#4ade80" transform="rotate(120 16 16)"/>
  <ellipse cx="16" cy="8" rx="4" ry="7.5" fill="#4ade80" transform="rotate(240 16 16)"/>
  <!-- Center hub -->
  <circle cx="16" cy="16" r="3.5" fill="#0a0a0c"/>
  <circle cx="16" cy="16" r="1.8" fill="#4ade80" opacity="0.6"/>
</svg>
